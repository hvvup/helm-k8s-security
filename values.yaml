namespace: default

networkPolicy:
  enabled: true

  defaultDenyIngress: true
  defaultDenyEgress: true

  allowedIngressPorts:
    - port: 80
      protocol: TCP
    - port: 443
      protocol: TCP
  
  allowedNamespaces:
    - name: monitoring
    - name: ingress-nginx

# Pod Security 설정

podSecurity:
  enabled: true

  # baseline / restricted /privileged
  level: restricted

  # 위반 시 동작: enforce / audit / warn
  enforce: warn
  audit: audit
  warn: warn

zeroTrust:
  enabled: true

  mtls:
    mode: STRICT

  authorizationPolicy:
    defaultDeny: true
    allowedServices:
        - name: frontend-to-backend
          server: backend
          client:
            serviceAccount: frontend-serviceAccount
          ports:
            - 8080

# Linkerd sub-chart
linkerd-control-plane:
  identityTrustAnchorsPEM: ""
  identity:
    issuer:
      tls:
        crtPEM: ""
        keyPEM: ""